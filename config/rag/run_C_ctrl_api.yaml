# run_C_ctrl — same retrieve/thresholds as run_C, no judge LLM and no corrective actions
# Deploy: python -m mmore rag -c config/rag/run_C_ctrl_api.yaml
rag:
  llm:
    llm_name: meta-llama/Llama-3.1-8B-Instruct
    max_new_tokens: 1200
  retriever:
    db:
      uri: ${DB_URI}
      name: ${DB_NAME}
    collection_name: ${COLLECTION_NAME}
    hybrid_search_weight: 0.5
    k: 5
    use_web: false
    reranker_model_name: BAAI/bge-reranker-base
  judge:
    llm:
      llm_name: meta-llama/Llama-3.1-8B-Instruct
      max_new_tokens: 512
      temperature: 0.01
    force_corrective_action: PROCEED
    system_prompt: |
      Unused (force_corrective_action: PROCEED). Frozen for manifest parity with run_C.
    user_prompt: |
      Question: {query}
      Return JSON only.
    metric_thresholds:
      min_mean_similarity: 0.5
      min_max_rerank_score: 1.0
      min_mean_rerank_score: 0.5
      min_num_docs: 3
    max_corrective_steps: 0
    allow_add_questions: false
    allow_add_context: false
    allow_re_retrieve: false
    max_web_results: 5
  system_prompt: "Use the following context to answer the questions.\n\nContext:\n{context}"
mode: api
mode_args:
  endpoint: /rag
  port: 8000
  host: 0.0.0.0
